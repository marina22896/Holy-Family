<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>WebAR — Custom Image + Video with Audio</title>
  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body, html { margin: 0; height: 100%; }
    #container { width: 100%; height: 100vh; overflow: hidden; }
    #play-audio-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 100;
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <!-- Button to trigger audio -->
  <button id="play-audio-btn">Play Audio</button>

  <div id="container">
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; uiLoading: no; uiScanning: no; uiError: no"
      color-space="sRGB" 
      renderer="antialias: true; alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded>

      <!-- Preload assets -->
      <a-assets>
        <img id="targetImage" src="./targets.jpeg" />

        <!-- Video for visuals (muted required for autoplay) -->
        <video id="myVideo" src="./video.mp4" loop muted playsinline webkit-playsinline crossorigin="anonymous" style="display:none"></video>

        <!-- Audio track for sound -->
        <audio id="myAudio" src="./video.mp4" loop></audio>
      </a-assets>

      <!-- Camera -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- AR Content bound to your image target -->
      <a-entity mindar-image-target="targetIndex: 0">
        <!-- Plane showing the video -->
        <a-plane position="0 0 0" rotation="0 0 0" height="1.25" width="1" material="shader: flat; src: #myVideo"></a-plane>
      </a-entity>

    </a-scene>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const video = document.getElementById('myVideo'); // Visual video
      const audio = document.getElementById('myAudio'); // Audio track
      const target = document.querySelector('[mindar-image-target]');
      const playAudioBtn = document.getElementById('play-audio-btn');

      // Start audio when user taps button
      playAudioBtn.addEventListener('click', async () => {
        try {
          await audio.play(); // Audio will start
          playAudioBtn.style.display = 'none'; // Hide button after tap
        } catch(err) {
          console.error('Error playing audio:', err);
        }
      });

      // Video autoplay (muted) when target found
      target.addEventListener('targetFound', async () => {
        try {
          await video.play();
        } catch(err) {
          console.warn('Autoplay blocked. Video visuals may not start automatically.', err);
        }
      });

      // Pause video/audio when target lost
      target.addEventListener('targetLost', () => {
        video.pause();
        video.currentTime = 0;
        audio.pause();
        audio.currentTime = 0;
      });
    });
  </script>
</body>
</html>
