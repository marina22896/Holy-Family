<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>WebAR — Video with Audio</title>
  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body, html { margin: 0; height: 100%; }
    #container { width: 100%; height: 100vh; overflow: hidden; }
  </style>
</head>
<body>
  <div id="container">
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; uiLoading: no; uiScanning: no; uiError: no"
      color-space="sRGB" 
      renderer="antialias: true; alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded>

      <!-- Preload assets -->
      <a-assets>
        <img id="targetImage" src="./targets.jpeg" />
        <!-- Video for visuals (muted required for autoplay) -->
        <video id="myVideo" src="./video.mp4" loop muted playsinline webkit-playsinline crossorigin="anonymous" style="display:none"></video>
        <!-- Separate audio track for sound -->
        <audio id="myAudio" src="./video-audio.mp3" loop></audio>
      </a-assets>

      <!-- Camera -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- AR Content bound to your image target -->
      <a-entity mindar-image-target="targetIndex: 0">
        <!-- Plane showing the video -->
        <a-plane position="0 0 0" rotation="0 0 0" height="1.25" width="1" material="shader: flat; src: #myVideo"></a-plane>
      </a-entity>

    </a-scene>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const video = document.getElementById('myVideo'); // Video visuals
      const audio = document.getElementById('myAudio'); // Audio track
      const target = document.querySelector('[mindar-image-target]');
      let audioStarted = false;

      // Start audio on first tap anywhere
      document.body.addEventListener('click', async () => {
        if (!audioStarted) {
          try {
            await audio.play();
            audioStarted = true;
          } catch(err) {
            console.error('Error playing audio:', err);
          }
        }
      }, { once: true });

      // Play video (muted) automatically when AR target is found
      target.addEventListener('targetFound', async () => {
        try {
          await video.play();
        } catch(err) {
          console.warn('Autoplay blocked for visuals.', err);
        }
      });

      // Pause video and audio when target is lost
      target.addEventListener('targetLost', () => {
        video.pause();
        video.currentTime = 0;
        audio.pause();
        audio.currentTime = 0;
      });
    });
  </script>
</body>
</html>
</html>
